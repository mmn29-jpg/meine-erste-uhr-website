<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meine Uhr</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #18212f;
      color: white;
    }

    main {
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 34px;
      font-weight: 700;
    }

    #clock {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 0;
      padding: 24px 32px;
      border: 2px solid #ffffff33;
      border-radius: 8px;
      background: #ffffff12;
    }
  </style>
</head>
<body>
  <main>
    <h1>Meine erste Website-Uhr</h1>
    <div id="clock">00:00:00</div>
  </main>

  <script>
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("de-DE");

      document.querySelector("#clock").textContent = time;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
